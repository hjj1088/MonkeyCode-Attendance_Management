<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>SheetJS Style Test</title></head>
<body>
<h1>SheetJS Cell Styles Test</h1>
<button onclick="testStyles()">Test Export</button>
<pre id="log"></pre>

<script src="lib/xlsx.full.min.js"></script>
<script>
const log = (msg) => {
  document.getElementById('log').textContent += msg + '\n';
  console.log(msg);
};

function testStyles() {
  document.getElementById('log').textContent = '';
  log('XLSX version: ' + XLSX.version);
  log('');

  // Build a minimal workbook with styled cells
  const ws = {};
  ws['!ref'] = 'A1:C3';

  // Header row
  ws['A1'] = { t: 's', v: 'Red Font', s: { font: { color: { rgb: 'FFFF0000' } } } };
  ws['B1'] = { t: 's', v: 'Blue Font', s: { font: { color: { rgb: 'FF0066CC' } } } };
  ws['C1'] = { t: 's', v: 'Blue Fill', s: { fill: { fgColor: { rgb: 'FFD9D9D9' }, patternType: 'solid' } } };

  // Data rows
  ws['A2'] = { t: 's', v: 'Normal' };
  ws['B2'] = { t: 's', v: '迟到' };
  ws['C2'] = { t: 's', v: '请假' };

  // Row 3 with both font and fill
  ws['A3'] = { t: 's', v: '兼有', s: { 
    font: { color: { rgb: 'FFFF0000' } }, 
    fill: { fgColor: { rgb: 'FFFFFFCC' }, patternType: 'solid' } 
  } };

  log('Cell objects:');
  log(JSON.stringify(ws, null, 2).slice(0, 1000));
  log('');

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Test');
  log('Workbook sheets: ' + wb.SheetNames.join(', '));

  // Method 1: XLSX.write with cellStyles
  log('\n--- Method 1: XLSX.write with cellStyles ---');
  try {
    const wbout1 = XLSX.write(wb, { bookType: 'xlsx', type: 'array', cellStyles: true });
    log('Output size: ' + wbout1.length + ' bytes');
    downloadBlob(wbout1, 'test_cellstyles.xlsx');
  } catch(e) { log('Error: ' + e.message); }

  // Method 2: XLSX.writeFile (for comparison)
  log('\n--- Method 2: XLSX.writeFile ---');
  try {
    XLSX.writeFile(wb, 'test_writefile.xlsx');
    log('writeFile called successfully');
  } catch(e) { log('Error: ' + e.message); }

  // Method 3: XLSX.write without cellStyles
  log('\n--- Method 3: XLSX.write WITHOUT cellStyles ---');
  try {
    const wbout3 = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
    log('Output size: ' + wbout3.length + ' bytes');
    log('Size diff with cellStyles: ' + (wbout3.length - (document._wbout1size || 0)) + ' bytes');
  } catch(e) { log('Error: ' + e.message); }
}

function downloadBlob(data, filename) {
  const blob = new Blob([data], { type: 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
