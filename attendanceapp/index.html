<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>考勤管理系统</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Fira Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    .login-bg {
      min-height: 100vh;
      background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 30%, #fafafa 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(124, 58, 237, 0.12);
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
    }

    .login-system-icon {
      display: flex;
      justify-content: center;
      margin-bottom: 0.75rem;
    }

    .login-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1e1b4b;
      text-align: center;
      margin-bottom: 0.25rem;
    }

    .login-subtitle {
      font-size: 0.875rem;
      color: #7C3AED;
      text-align: center;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: 0.375rem;
    }

    .form-input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 0.9375rem;
      font-family: inherit;
      color: #1f2937;
      background: #f9fafb;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      outline: none;
    }

    .form-input:focus {
      border-color: #7C3AED;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
      background: #fff;
    }

    .form-input::placeholder {
      color: #c4b5fd;
    }

    .btn-login {
      width: 100%;
      padding: 0.75rem;
      background: linear-gradient(135deg, #7C3AED, #6D28D9);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(124, 58, 237, 0.35);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .error-msg {
      margin-bottom: 1rem;
      padding: 0.625rem 1rem;
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
      border-radius: 8px;
      font-size: 0.8125rem;
      text-align: center;
    }

    .hint-text {
      font-size: 0.75rem;
      color: #a78bfa;
      text-align: center;
      margin-top: 1rem;
    }

    .dashboard-bg {
      min-height: 100vh;
      background: #fafafe;
    }

    .dashboard-header {
      background: #fff;
      border-bottom: 1px solid #ede9fe;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 0.625rem;
    }

    .header-logo {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #7C3AED, #6D28D9);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-system-name {
      font-size: 0.9375rem;
      font-weight: 600;
      color: #1e1b4b;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .header-greeting {
      font-size: 0.875rem;
      font-weight: 500;
      color: #6b7280;
    }

    .header-greeting strong {
      color: #7C3AED;
      font-weight: 600;
    }

    .btn-logout {
      padding: 0.5rem 1.25rem;
      background: transparent;
      color: #6b7280;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.8125rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      color: #dc2626;
      border-color: #fca5a5;
      background: #fef2f2;
    }

    .dashboard-content {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
    }

    .dashboard-welcome {
      margin-bottom: 2rem;
    }

    .dashboard-welcome h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1e1b4b;
      margin-bottom: 0.375rem;
    }

    .dashboard-welcome p {
      font-size: 0.875rem;
      color: #9ca3af;
    }

    .nav-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1.25rem;
    }

    @media (max-width: 1199px) {
      .nav-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 767px) {
      .nav-grid {
        grid-template-columns: 1fr;
      }
      .dashboard-content {
        padding: 1.5rem 1rem;
      }
      .dashboard-header {
        padding: 0.75rem 1rem;
        flex-direction: column;
        gap: 0.5rem;
      }
      .header-right {
        width: 100%;
        justify-content: space-between;
      }
      .login-card {
        margin: 1rem;
        padding: 1.75rem;
      }
    }

    .nav-card {
      background: #fff;
      border: 1.5px solid #e5e7eb;
      border-radius: 14px;
      padding: 1.5rem 1.25rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .nav-card:hover {
      border-color: #7C3AED;
      box-shadow: 0 8px 24px rgba(124, 58, 237, 0.12);
      transform: translateY(-3px);
    }

    .card-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: #f5f3ff;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      transition: background 0.25s;
    }

    .nav-card:hover .card-icon {
      background: #ede9fe;
    }

    .card-title {
      font-size: 0.9375rem;
      font-weight: 600;
      color: #1e1b4b;
      margin-bottom: 0.375rem;
    }

    .card-desc {
      font-size: 0.75rem;
      color: #9ca3af;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="app">
    <div v-if="!loggedIn" class="login-bg">
      <div class="login-card">
        <div class="login-system-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <div class="login-title">考勤管理系统</div>
        <div class="login-subtitle">请登录以继续</div>

        <div class="form-group">
          <label class="form-label">账号</label>
          <input v-model="username" type="text" class="form-input" placeholder="请输入账号">
        </div>

        <div class="form-group">
          <label class="form-label">密码</label>
          <input v-model="password" type="password" class="form-input" placeholder="请输入密码" @keyup.enter="doLogin">
        </div>

        <div v-if="errorMsg" class="error-msg">{{ errorMsg }}</div>

        <button @click="doLogin" class="btn-login">登 录</button>

        <div class="hint-text">默认账号：admin / admin123</div>
      </div>
    </div>

    <div v-else class="dashboard-bg">
      <header class="dashboard-header">
        <div class="header-brand">
          <div class="header-logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
          </div>
          <span class="header-system-name">考勤管理系统</span>
        </div>
        <div class="header-right">
          <span class="header-greeting"><strong>{{ greetingUser }}</strong>，{{ greetingText }}</span>
          <button @click="doLogout" class="btn-logout">退出登录</button>
        </div>
      </header>

      <div class="dashboard-content">
        <div class="dashboard-welcome">
          <h2>功能导航</h2>
          <p>选择以下模块开始管理考勤数据</p>
        </div>

        <div class="nav-grid">
          <a href="import.html" class="nav-card">
            <div class="card-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
            </div>
            <div class="card-title">数据导入</div>
            <div class="card-desc">拖拽上传Excel文件，自动识别并导入考勤数据</div>
          </a>

          <a href="attendance.html" class="nav-card">
            <div class="card-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
              </svg>
            </div>
            <div class="card-title">考勤计算</div>
            <div class="card-desc">运行规则引擎，列表 / 日历视图查询考勤结果</div>
          </a>

          <a href="export.html" class="nav-card">
            <div class="card-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
            </div>
            <div class="card-title">导出中心</div>
            <div class="card-desc">设计导出模板，预览并导出考勤凭证</div>
          </a>

          <a href="attendance-settings.html" class="nav-card">
            <div class="card-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
              </svg>
            </div>
            <div class="card-title">考勤规则</div>
            <div class="card-desc">配置考勤班次、节假日与加班规则</div>
          </a>

          <a href="settings.html" class="nav-card">
            <div class="card-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
              </svg>
            </div>
            <div class="card-title">系统设置</div>
            <div class="card-desc">管理用户权限、公司信息与系统参数</div>
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="./lib/vue.global.prod.js?v=1.0.10"></script>
  <script src="./shared/auth.js?v=1.0.10"></script>
  <script>
    const { createApp } = Vue;
    createApp({
      data() {
        return {
          loggedIn: Auth.isLoggedIn(),
          username: 'admin',
          password: '',
          errorMsg: ''
        };
      },
      computed: {
        greetingUser() {
          return localStorage.getItem('attendance_user') || '管理员';
        },
        greetingText() {
          const hour = new Date().getHours();
          if (hour < 12) return '上午好';
          if (hour < 18) return '下午好';
          return '晚上好';
        }
      },
      methods: {
        doLogin() {
          const result = Auth.login(this.username, this.password);
          if (result.success) {
            localStorage.setItem('attendance_user', this.username);
            this.loggedIn = true;
            this.errorMsg = '';
          } else {
            this.errorMsg = result.message;
          }
        },
        doLogout() {
          localStorage.removeItem('attendance_user');
          Auth.logout();
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
