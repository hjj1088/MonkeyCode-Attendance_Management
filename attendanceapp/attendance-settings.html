    .bg-red-100 { background-color: #fee2e2; }
    .bg-red-600 { background-color: #dc2626; }

    .border-red-200 { border-color: #fecaca; }
    .border-green-200 { border-color: #bbf7d0; }

    /* --- Border Radius --- */
    .rounded { border-radius: 0.25rem; }
    .rounded-md { border-radius: 0.375rem; }
    .rounded-lg { border-radius: 0.5rem; }
    .rounded-xl { border-radius: 0.75rem; }

    .rounded-l-xl { border-top-left-radius: 0.75rem; border-bottom-left-radius: 0.75rem; }
    .rounded-r-xl { border-top-right-radius: 0.75rem; border-bottom-right-radius: 0.75rem; }

    /* --- Shadows --- */
    .shadow-sm { box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05); }

    .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1); }

    /* --- Effects --- */
    .backdrop-blur { backdrop-filter: blur(8px); }

    /* --- Transitions --- */
    .transition { transition-property: color, background-color, border-color, text-decoration-color, fill, stroke, opacity, box-shadow, transform, filter, backdrop-filter; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 150ms; }
    .transition-all { transition-property: all; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 150ms; }
    .transition-colors { transition-property: color, background-color, border-color, text-decoration-color, fill, stroke; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 150ms; }
    .transition-transform { transition-property: transform; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 150ms; }
    .duration-200 { transition-duration: 200ms; }
    .duration-300 { transition-duration: 300ms; }
    .ease-in-out { transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }

    /* --- Transforms --- */
    .-translate-x-full { transform: translateX(-100%); }
    .translate-x-0 { transform: translateX(0); }

    /* --- Opacity --- */
    .opacity-0 { opacity: 0; }
    .opacity-100 { opacity: 1; }

    /* --- Outline --- */
    .outline-none { outline: none; }

    /* --- Focus ring --- */
    .focus\:outline-none:focus { outline: none; }

    /* --- Hover --- */

    .hover\:text-red-700:hover { color: #b91c1c; }
    .hover\:text-purple-600:hover { color: #7C3AED; }

    /* --- Appearance --- */
    .appearance-none { appearance: none; }

    /* --- Misc --- */
    .select-none { user-select: none; }

    .toast-enter { opacity: 0; transform: translateY(-1rem); }

    .toast-leave { opacity: 1; transform: translateY(0); }

    /* --- Custom component styles --- */

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="form-label">上班时间</label>
              <input v-model="config.workStartTime" type="time" class="form-input">
            </div>
            <div>
              <label class="form-label">下班时间</label>
              <input v-model="config.workEndTime" type="time" class="form-input">
            </div>
            <div>
              <label class="form-label">迟到阈值 (分钟)</label>
              <input v-model.number="config.lateThreshold" type="number" min="0" class="form-input">
            </div>
            <div>
              <label class="form-label">早退阈值 (分钟)</label>
              <input v-model.number="config.earlyThreshold" type="number" min="0" class="form-input">
            </div>
          </div>
        </div>

        <!-- 2. 容错规则 -->
        <div class="section-card">
          <div class="section-header">
            <div class="section-title">
              <div class="section-title-icon bg-purple-100">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              </div>
              容错规则
            </div>
            <button @click="saveConfig" class="btn btn-primary">保存设置</button>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="form-label">每月豁免次数</label>
              <input v-model.number="config.graceTimes" type="number" min="0" class="form-input">
            </div>
            <div>
              <label class="form-label">累计豁免时长 (分钟)</label>
              <input v-model.number="config.graceMinutes" type="number" min="0" class="form-input">
            </div>
          </div>
        </div>

        <!-- 3. 假期管理 -->
        <div class="section-card">
          <div class="section-header">
            <div class="section-title">
              <div class="section-title-icon bg-purple-100">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              </div>
              假期管理
            </div>
          </div>

          <div class="flex flex-wrap gap-3 mb-4 items-end">
            <div>
              <label class="form-label">开始日期</label>
              <input v-model="newHoliday.startDate" type="date" class="form-input">
            </div>
            <div>
              <label class="form-label">结束日期</label>
              <input v-model="newHoliday.endDate" type="date" class="form-input">
            </div>
            <div>
              <label class="form-label">假期名称</label>
              <input v-model="newHoliday.name" type="text" placeholder="例：春节" class="form-input w-32">
            </div>
            <div>
              <label class="form-label">类型</label>
              <select v-model="newHoliday.type" class="form-select w-40">
                <option value="holiday">休息日</option>
                <option value="workday">调休上班日</option>
              </select>
            </div>
            <button @click="addHolidays" class="btn btn-primary h-10 -mt-0.5">批量添加</button>
          </div>

          <div class="space-y-2">
            <div v-for="h in holidays" :key="h.id" class="holiday-list-item">
              <div class="flex items-center gap-2">
                <span class="text-sm text-slate-700">{{ h.date }}</span>
                <span class="text-sm font-medium text-slate-800">{{ h.name }}</span>
                <span :class="h.isWorkday ? 'holiday-tag holiday-tag-work' : 'holiday-tag holiday-tag-rest'">
                  {{ h.isWorkday ? '上班' : '休息' }}
                </span>
              </div>
              <button @click="deleteHoliday(h.id)" class="btn btn-danger-text btn-sm">删除</button>
            </div>
            <div v-if="holidays.length === 0" class="py-8 text-center text-slate-400 text-sm">
              <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin: 0 auto 0.5rem; display: block; opacity: 0.4;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              暂无假期设置
            </div>
          </div>
        </div>

        <!-- 4. 排班管理 -->
        <div class="section-card">
          <div class="section-header">
            <div class="section-title">
              <div class="section-title-icon bg-purple-100">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
              </div>
              排班管理
            </div>
          </div>
          <div class="placeholder-box">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
            <p class="text-slate-400 text-sm">排班管理功能即将上线</p>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="./lib/vue.global.prod.js?v=2.0.0"></script>
  <script src="./lib/dexie.min.js?v=2.0.0"></script>
  <script src="./shared/auth.js?v=2.0.0"></script>
  <script src="./shared/db.js?v=2.0.0"></script>
  <script src="./shared/layout.js?v=2.0.0"></script>
  <script>
    Auth.requireAuth();

    const { createApp } = Vue;
    createApp({
      data() {
        return {
          saved: false,
          config: {
            workStartTime: '08:30',
            workEndTime: '17:30',
            lateThreshold: 0,
            earlyThreshold: 0,
            graceTimes: 2,
            graceMinutes: 30
          },
          holidays: [],
          newHoliday: { startDate: '', endDate: '', name: '', type: 'holiday' }
        };
      },
      async created() {
        const entry = await Store.getByKey('settings', 'attendance_config');
        if (entry && entry.value) {
          Object.assign(this.config, entry.value);
        }
        this.holidays = await Store.getAll('holidays');
      },
      methods: {
        async saveConfig() {
          await Store.put('settings', { key: 'attendance_config', value: { ...this.config } });
          await Store.put('settings', { key: 'config_updated_at', value: Date.now() });
          this.saved = true;
          setTimeout(() => { this.saved = false; }, 3000);
        },
        async addHolidays() {
          const start = this.newHoliday.startDate;
          const end = this.newHoliday.endDate || start;
          if (!start) return;
          if (start > end) { alert('结束日期不能早于开始日期'); return; }
          const isWorkday = this.newHoliday.type === 'workday';
          const name = this.newHoliday.name || (isWorkday ? '调休上班' : '假期');
          const startDate = new Date(start + 'T00:00:00');
          const endDate = new Date(end + 'T00:00:00');
          const records = [];
          for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
            const dateStr = d.toISOString().slice(0, 10);
            records.push({ date: dateStr, name, isWorkday, isHoliday: !isWorkday });
          }
          await Store.bulkPut('holidays', records);
          await Store.put('settings', { key: 'config_updated_at', value: Date.now() });
          this.holidays = await Store.getAll('holidays');
          this.newHoliday = { startDate: '', endDate: '', name: '', type: 'holiday' };
        },
        async deleteHoliday(id) {
          await Store.deleteByKey('holidays', id);
          await Store.put('settings', { key: 'config_updated_at', value: Date.now() });
          this.holidays = await Store.getAll('holidays');
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
